name: Deploy to Uniweb

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: deploy-uniweb
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      SSH_HOST: ${{ secrets.SSH_HOST }}
      SSH_USERNAME: ${{ secrets.SSH_USERNAME }}
      SSH_TARGET_DIR: ${{ secrets.SSH_TARGET_DIR }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build app
        run: npm run build
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}

      - name: Start SSH agent
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}

      - name: Check required secrets
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
        run: |
          test -n "$SSH_USERNAME" || { echo "::error::Missing SSH_USERNAME secret"; exit 1; }
          test -n "$SSH_HOST" || { echo "::error::Missing SSH_HOST secret"; exit 1; }
          test -n "$SSH_TARGET_DIR" || { echo "::error::Missing SSH_TARGET_DIR secret"; exit 1; }
          test -n "$VITE_SUPABASE_URL" || { echo "::error::Missing VITE_SUPABASE_URL secret"; exit 1; }
          test -n "$VITE_SUPABASE_ANON_KEY" || { echo "::error::Missing VITE_SUPABASE_ANON_KEY secret"; exit 1; }
          test "$SSH_TARGET_DIR" != "/" || { echo "::error::SSH_TARGET_DIR must not be /"; exit 1; }
          test "$SSH_TARGET_DIR" != "." || { echo "::error::SSH_TARGET_DIR must not be ."; exit 1; }
          test -d dist || { echo "::error::dist directory is missing"; exit 1; }
          test -f dist/index.html || { echo "::error::dist/index.html is missing"; exit 1; }

      - name: Add known host
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -H -p 22 "$SSH_HOST" >> ~/.ssh/known_hosts

      - name: Test SSH login
        run: |
          ssh-add -l
          ssh -o BatchMode=yes -o ConnectTimeout=20 -p 22 "$SSH_USERNAME@$SSH_HOST" \
            "test -d '$SSH_TARGET_DIR' && test -w '$SSH_TARGET_DIR'"

      - name: Deploy dist to Uniweb
        run: |
          rsync -avz --delete \
            -e "ssh -p 22" \
            dist/ "$SSH_USERNAME@$SSH_HOST:$SSH_TARGET_DIR/"

      - name: Purge Uniweb cache
        continue-on-error: true
        run: |
          ssh -p 22 "$SSH_USERNAME@$SSH_HOST" 'command -v cache-purge >/dev/null 2>&1 && cache-purge || true'
 